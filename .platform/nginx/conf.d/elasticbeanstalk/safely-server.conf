if ($bad_bot) {
    return 403;
}

location ~ /\.(?!well-known).* {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* ^/(phpmyadmin|wp-admin|wp-login\.php|xmlrpc\.php|cgi-bin|boaform|vendor) {
    return 403;
}

location ^~ /swagger-ui/ {
    limit_req zone=perip burst=20 nodelay;
    limit_conn addr 10;
}

location = /swagger-ui.html {
    limit_req zone=perip burst=20 nodelay;
    limit_conn addr 10;
}

location ^~ /v3/api-docs/ {
    limit_req zone=perip burst=20 nodelay;
    limit_conn addr 10;
}

location = /v3/api-docs {
    limit_req zone=perip burst=20 nodelay;
    limit_conn addr 10;
}

location = /health {
    access_log off;
}

location ^~ /actuator/ {
    return 403;
}

location ^~ /api/auth/ {
    limit_req zone=perip burst=5 nodelay;
    limit_conn addr 10;
}

location / {
    limit_req zone=perip burst=15 nodelay;
    limit_conn addr 20;
}